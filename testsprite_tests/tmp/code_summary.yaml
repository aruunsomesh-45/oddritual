version: "2"
type: backend
tech_stack:
  - Python 3.14
  - Django 6.0.4
  - SQLite (development) / PostgreSQL via Supabase (production)
  - Razorpay Payment Gateway
  - django-environ
  - dj-database-url
  - Pillow (image handling)
  - Bleach (HTML sanitization)
features:
  - name: Home Page & Newsletter
    description: Renders home page with products and community items. Handles newsletter subscription via contact form POST.
    files:
      - store/views.py
      - store/models.py
      - store/urls.py
    endpoints:
      - method: GET
        path: /
        description: Display home page with products and community items
        auth_required: false
        response_schema:
          "200": HTML page with products and community context
      - method: POST
        path: /
        description: Subscribe to newsletter with name and email
        auth_required: false
        request_schema:
          body:
            name: string
            email: string
        response_schema:
          "302": Redirect to home page
    depends_on: []

  - name: About Page
    description: Renders the about page with product listings
    files:
      - store/views.py
      - store/urls.py
    endpoints:
      - method: GET
        path: /about/
        description: Display about page
        auth_required: false
        response_schema:
          "200": HTML page
    depends_on: []

  - name: Shop Page
    description: Renders the shop listing page with all products
    files:
      - store/views.py
      - store/urls.py
    endpoints:
      - method: GET
        path: /shop/
        description: Display shop page with all products
        auth_required: false
        response_schema:
          "200": HTML page with products
    depends_on: []

  - name: Product Detail
    description: Renders individual product detail page by product_id
    files:
      - store/views.py
      - store/models.py
      - store/urls.py
    endpoints:
      - method: GET
        path: /p/{pid}/
        description: Display product detail page
        auth_required: false
        response_schema:
          "200": HTML page with product details
          "404": Product not found
    depends_on: []

  - name: Contact Form
    description: Contact page with form submission supporting name, email, message. Input sanitized via Bleach.
    files:
      - store/views.py
      - store/forms.py
      - store/models.py
      - store/urls.py
    endpoints:
      - method: GET
        path: /contact/
        description: Display contact form page
        auth_required: false
        response_schema:
          "200": HTML page with contact form
      - method: POST
        path: /contact/
        description: Submit contact form
        auth_required: false
        request_schema:
          body:
            name: string
            email: string
            message: string
        response_schema:
          "302": Redirect to contact page with success/error message
    depends_on: []

  - name: Cart Management
    description: Session-based shopping cart with add, view, update (increase/decrease quantity), and remove operations
    files:
      - store/views.py
      - store/models.py
      - store/urls.py
    endpoints:
      - method: POST
        path: /cart/add/{pid}/
        description: Add product to cart (creates session if needed, updates quantity if item with same size exists)
        auth_required: false
        request_schema:
          body:
            size: string (default M)
            quantity: integer (default 1)
        response_schema:
          "302": Redirect to cart view
          "404": Product not found
      - method: GET
        path: /cart/
        description: View cart contents with totals
        auth_required: false
        response_schema:
          "200": HTML page with cart items, total, and cart count
      - method: GET
        path: /cart/remove/{item_id}/
        description: Remove item from cart
        auth_required: false
        response_schema:
          "302": Redirect to cart view
      - method: POST
        path: /cart/update/{item_id}/
        description: Update cart item quantity (increase/decrease). Deletes item if quantity reaches 0.
        auth_required: false
        request_schema:
          body:
            action: string (increase or decrease)
        response_schema:
          "200":
            status: string
            quantity: integer
            item_subtotal: number
            cart_total: number
            cart_count: integer
          "400": Error response
    depends_on: []

  - name: Razorpay Order Creation
    description: Creates a Razorpay payment order. Calculates amount from cart items or single product fallback.
    files:
      - payments/views.py
      - payments/models.py
      - payments/urls.py
    endpoints:
      - method: POST
        path: /payments/create-order/
        description: Create a Razorpay order for checkout
        auth_required: false
        request_schema:
          body:
            product_id: string (optional, fallback if cart is empty)
        response_schema:
          "200":
            order_id: string
            amount: integer (paise)
            currency: string
            key_id: string
          "400": Error response
          "404": Product not found
    depends_on:
      - Cart Management

  - name: Payment Verification & Invoice
    description: Verifies Razorpay payment signature, updates order status, generates invoice, links products, and clears cart
    files:
      - payments/views.py
      - payments/models.py
      - payments/urls.py
    endpoints:
      - method: POST
        path: /payments/verify-payment/
        description: Verify payment signature and generate invoice
        auth_required: false
        request_schema:
          body:
            payment_id: string
            razorpay_order_id: string
            razorpay_signature: string
            product_id: string
            customer_name: string
            phone: string
            email: string
            address: string
        response_schema:
          "200":
            status: string
            message: string
          "400": Invalid signature or error
          "404": Order not found
    depends_on:
      - Razorpay Order Creation
      - Cart Management

  - name: Django Admin
    description: Django admin interface for managing all models
    files:
      - store/admin.py
      - payments/admin.py
    endpoints:
      - method: GET
        path: /admin/
        description: Django admin dashboard
        auth_required: true
        response_schema:
          "200": Admin HTML page
    depends_on: []

known_limitations:
  - issue: No CSRF protection on verify_payments endpoint (uses @csrf_exempt)
    location: payments/views.py
    impact: Payment verification endpoint is vulnerable to CSRF attacks
  - issue: No input validation on product_id in create_orders
    location: payments/views.py
    impact: Invalid product_id values are not validated before database lookup
  - issue: Session-based cart has no expiry mechanism
    location: store/views.py
    impact: Cart items persist indefinitely without cleanup
  - issue: No authentication required for payment endpoints
    location: payments/views.py
    impact: Any user can create orders and verify payments without authentication
  - issue: Typo in invoice model field name (invioce_id instead of invoice_id)
    location: payments/models.py
    impact: Inconsistent field naming that could cause confusion
  - issue: process_checkout view uses hardcoded dummy product data
    location: payments/views.py
    impact: Email invoice contains dummy data instead of actual order products
